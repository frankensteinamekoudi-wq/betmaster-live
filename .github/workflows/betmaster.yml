name: Bot BetMaster Football

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le bot
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python bot_football.py

      - name: Sauvegarder data.json (commit automatique)
        run: |
          git config user.name "Bot BetMaster"
          git config user.email "bot@users.noreply.github.com"
          git add data.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data.json [skip ci]"
          git push
